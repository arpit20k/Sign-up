<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
</head>
<body>
<div class="center">
    <div class="img">
        <img src="photo-1585202900225-6d3ac20a6962.avif" alt="greenery">
    </div>
    <div class="form">
                <p>This is a Form</p>
                <p>Let's do this!</p>
                <form>
                    <label for="firstname">FIRST NAME</label>
                    <input type="text" action="#" 
                    id="firstname" name="firstname"></input>

                    <label for="lastname">LAST NAME</label>
                    <input type="text" action="#" 
                    id="lastname" name="lastname"></input>

                    <label for="email">EMAIL</label>
                    <input type="email" action="#" 
                    id="email" name="email"></input>
                    
                    <label for="phone">PHONE</label>
                    <input type="number" action="#" 
                    id="phone" name="phone" max="9999999999" min="1000000000"></input>
                    
                    <label for="password">Password</label>
                    <input type="password" action="#" 
                    id="password" name="password" pattern="*"></input>
                    
                    <label for="cpassword">Confirm Password</label>
                    <input type="password" action="#" 
                    id="cpassword" name="cpassword" pattern="*"></input>
                    <hr>
                    <button type="submit" id="btn">Create Account</button>
                </form>
    </div>
</div>
</body>
</html>
